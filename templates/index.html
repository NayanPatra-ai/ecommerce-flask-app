<!DOCTYPE html>
<html>
<head>
    <title>E-Commerce</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="navbar">
    <h2>My Store</h2>
    <div>
        <a href="{{ url_for('login') }}">Login</a>
        <a href="{{ url_for('register') }}">Register</a>
        <a href="{{ url_for('view_cart') }}">Cart</a>
        <a href="{{ url_for('logout') }}">Logout</a>
    </div>
</div>

<div class="container">
    <h1>Products</h1>

    <div class="products">
        {% for product in products %}
        <div class="card">
            <img src="{{ url_for('static', filename=product.image) }}" width="200" height="150">
            <h3>{{ product.name }}</h3>
            <p>₹{{ product.price }}</p>

            <a class="btn" href="{{ url_for('add_to_cart', product_id=product.id) }}">
                Add to Cart
            </a>
        </div>
        {% endfor %}
    </div>
</div>

</body>
</html>
